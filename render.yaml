services:
  - type: web
    name: classwatch
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        generateValue: true
      - key: CLASSWATCH_DB_PATH
        value: /var/data/classwatch.db
      - key: CLASSWATCH_YOLO_MODEL
        value: /var/data/models/yolov8n.pt
      - key: CLASSWATCH_AUTO_DOWNLOAD_YOLO
        value: "1"
      - key: CLASSWATCH_SECURE_COOKIE
        value: "1"
      - key: CLASSWATCH_STUN_URLS
        value: stun:stun.l.google.com:19302
